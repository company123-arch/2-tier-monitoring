version: "3.8"

services:

  mysql-db:
    image: mysql:5.7
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: employees
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  flask-app:
    build: ./app
    container_name: flask-app
    restart: always
    depends_on:
      - mysql-db
    ports:
      - "8080:8080"
    environment:
      DBHOST: mysql-db
      DBUSER: root
      DBPWD: root123
      DBPORT: 3306
      DATABASE: employees

volumes:
  mysql-data:
